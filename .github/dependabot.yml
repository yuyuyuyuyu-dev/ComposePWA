version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"

  # The example app is a separate Gradle build with its own version catalog
  # (example/gradle/libs.versions.toml), so it needs its own update entry.
  - package-ecosystem: "gradle"
    directory: "/example"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
