name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  plugin:
    name: Plugin unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone Repository
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "jetbrains"
        # The JetBrains distribution resolves its version via the GitHub API;
        # authenticate so it isn't throttled by the 60 req/hour/IP limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run plugin tests
        run: ./gradlew -p plugin test

  plugin-output:
    name: ComposePWA output (web assets the plugin emits)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone Repository
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "jetbrains"
        # The JetBrains distribution resolves its version via the GitHub API;
        # authenticate so it isn't throttled by the 60 req/hour/IP limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Run the plugin against the example app so it copies its resources and
      # ensures the PWA tags in index.html, exactly as a consumer's build would.
      - name: Generate ComposePWA outputs
        working-directory: example
        run: ./gradlew :webApp:initComposePwaForWasm :webApp:initComposePwaForJs

      # The headline guarantee: running the plugin must not rewrite any committed,
      # formatter-clean file (index.html in particular). A non-empty diff fails here.
      - name: Verify the plugin left tracked files untouched
        run: git diff --exit-code

      # The example app is excluded from the repo's general lint (it is a faithful,
      # drop-in user project), so check the files the plugin emits/modifies with a
      # targeted Prettier run. --ignore-path /dev/null bypasses .prettierignore's example/.
      - name: Check the plugin's emitted web assets are formatter-clean
        run: >
          npx prettier --check --ignore-path /dev/null
          example/webApp/src/webMain/resources/index.html
          example/webApp/src/webMain/resources/manifest.json
          example/webApp/src/webMain/resources/registerServiceWorker.js
          example/webApp/workbox-config-for-wasm.js
          example/webApp/workbox-config-for-js.js

  test-pwa:
    name: Test ${{ matrix.target-name }} PWA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-name: "Wasm"
            gradle-task: "wasmJsBrowserDistribution"
            build-dir: "wasmJs"
            config-file: "workbox-config-for-wasm.js"
          - target-name: "JS"
            gradle-task: "jsBrowserDistribution"
            build-dir: "js"
            config-file: "workbox-config-for-js.js"

    steps:
      - name: Clone Repository
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "jetbrains"
        # The JetBrains distribution resolves its version via the GitHub API;
        # authenticate so it isn't throttled by the 60 req/hour/IP limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build ${{ matrix.target-name }} as PWA
        working-directory: example
        run: ./gradlew :webApp:${{ matrix.gradle-task }}

      - name: Assert ${{ matrix.target-name }} PWA generated files
        run: |
          test -f example/webApp/build/dist/${{ matrix.build-dir }}/productionExecutable/serviceWorker.js || { echo '::error::serviceWorker.js Not Found'; exit 1; }
          test -f example/webApp/${{ matrix.config-file }} || { echo '::error::${{ matrix.config-file }} Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/manifest.json || { echo '::error::manifest.json Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/registerServiceWorker.js || { echo '::error::registerServiceWorker.js Not Found'; exit 1; }

          test -f example/webApp/src/webMain/resources/icons/icon-72x72.png || { echo '::error::icons/icon-72x72.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-96x96.png || { echo '::error::icons/icon-96x96.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-128x128.png || { echo '::error::icons/icon-128x128.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-144x144.png || { echo '::error::icons/icon-144x144.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-152x152.png || { echo '::error::icons/icon-152x152.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-192x192.png || { echo '::error::icons/icon-192x192.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-384x384.png || { echo '::error::icons/icon-384x384.png Not Found'; exit 1; }
          test -f example/webApp/src/webMain/resources/icons/icon-512x512.png || { echo '::error::icons/icon-512x512.png Not Found'; exit 1; }

          grep -q 'registerServiceWorker.js' example/webApp/src/webMain/resources/index.html || { echo '::error::registerServiceWorker.js is missing from index.html'; exit 1; }
          grep -q 'manifest.json' example/webApp/src/webMain/resources/index.html || { echo '::error::manifest.json is missing from index.html'; exit 1; }

          test ! -e example/webApp/src/webMain/resources/__MACOSX || { echo '::error::__MACOSX metadata folder should not exist in resources'; exit 1; }
          test ! -e example/webApp/src/webMain/resources/icons/.DS_Store || { echo '::error::.DS_Store metadata file should not exist in icons'; exit 1; }
          test ! -e example/webApp/build/dist/${{ matrix.build-dir }}/productionExecutable/__MACOSX || { echo '::error::__MACOSX metadata folder should not exist in dist'; exit 1; }
